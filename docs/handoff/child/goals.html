<!-- ========================================================================
  UNOZAWA BANK / 子供・ためる（目標一覧）
  必要: child.css。data-theme 切替。目標の絵は .cs-goalpic img の src を差し替え。
  ======================================================================== -->
<div class="cs-scr" data-theme="rei" data-screen="goals">
  <span class="cs-blob cs-b1"></span><span class="cs-blob cs-b2"></span><span class="cs-blob cs-b3"></span>
  <div class="cs-status"><span>9:41</span><span class="r">▮▮▮ 100%</span></div>

  <div class="cs-head">
    <span class="cs-avatar"><img src="../mascots/rei-avatar.png" alt="" onerror="this.style.display='none'"></span>
    <div><div class="cs-hello">おはよう！</div><div class="cs-name">れい</div></div>
    <div class="cs-bal"><div class="k">もってる おかね</div><div class="v">¥1,670</div></div>
  </div>

  <div class="cs-mascot">
    <div class="cs-bubble">もくひょうは いくつでも <ruby>決<rt>き</rt></ruby>められるよ！</div>
    <div class="cs-mascot-badge">
      <svg width="40" height="40" viewBox="0 0 64 64" fill="none"><rect x="19" y="13" width="26" height="16" rx="2.5" fill="#FFD86F"/><circle cx="26" cy="21" r="4.3" fill="none" stroke="#1B3A6B" stroke-width="1.6"/><path d="M33 18 H41 M33 21 H41 M33 24 H38" stroke="#1B3A6B" stroke-width="1.4" stroke-linecap="round"/><path d="M13 20 a4 4 0 0 1 8 0 v13 q11 4.5 22 0 v-13 a4 4 0 0 1 8 0 v13 a15 15 0 0 1 -38 0 Z" fill="#F5B62E"/></svg>
    </div>
  </div>

  <div class="cs-body">
    <div class="cs-titlechip"><span class="ic"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><rect x="5" y="9" width="14" height="11" rx="3"/><rect x="8" y="5" width="8" height="3" rx="1.5"/></svg></span>ためる</div>
    <div class="cs-grid cs-grid--goals">
      <!-- 目標1（いま ためてる） -->
      <div class="cs-card" style="padding:14px;display:flex;gap:14px;align-items:center;">
        <span class="cs-goalpic"><img src="" alt="" onerror="this.style.display='none'"></span>
        <div style="flex:1;min-width:0;">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:7px;">
            <div style="font:var(--hw) 16px inherit;color:var(--ink);"><ruby>新<rt>あたら</rt></ruby>しいゲーム</div>
            <span class="cs-badge" style="margin-left:auto;background:var(--accent);"><svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><polygon points="12,2 15,9 22,9 16,14 18,21 12,17 6,21 8,14 2,9 9,9"/></svg>いま ためてる</span>
          </div>
          <div class="cs-bar" style="height:14px;"><i style="width:57%;"></i></div>
          <div style="display:flex;align-items:center;gap:6px;margin-top:8px;"><span class="cs-coin" style="width:16px;height:16px;">¥</span><span style="font:700 11px inherit;color:var(--ink);">あと <b style="color:var(--accent-ink);font-size:16px;font-weight:900;">650</b> えん</span></div>
        </div>
      </div>
      <!-- 目標2 -->
      <div class="cs-card" style="padding:14px;display:flex;gap:14px;align-items:center;">
        <span class="cs-goalpic"><img src="" alt="" onerror="this.style.display='none'"></span>
        <div style="flex:1;min-width:0;">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:7px;">
            <div style="font:var(--hw) 16px inherit;color:var(--ink);">じてんしゃ</div>
            <span class="cs-badge" style="margin-left:auto;background:#EAF6FE;color:var(--sub);border:1.5px solid #BBDCF0;">つぎ</span>
          </div>
          <div class="cs-bar" style="height:14px;"><i style="width:20%;"></i></div>
          <div style="display:flex;align-items:center;gap:6px;margin-top:8px;"><span class="cs-coin" style="width:16px;height:16px;">¥</span><span style="font:700 11px inherit;color:var(--ink);">あと <b style="color:var(--accent-ink);font-size:16px;font-weight:900;">4000</b> えん</span></div>
        </div>
      </div>
      <!-- 目標3 -->
      <div class="cs-card" style="padding:14px;display:flex;gap:14px;align-items:center;">
        <span class="cs-goalpic"><img src="" alt="" onerror="this.style.display='none'"></span>
        <div style="flex:1;min-width:0;">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:7px;">
            <div style="font:var(--hw) 16px inherit;color:var(--ink);">サッカーボール</div>
            <span class="cs-badge" style="margin-left:auto;background:#EAF6FE;color:var(--sub);border:1.5px solid #BBDCF0;">つぎ</span>
          </div>
          <div class="cs-bar" style="height:14px;"><i style="width:80%;"></i></div>
          <div style="display:flex;align-items:center;gap:6px;margin-top:8px;"><span class="cs-coin" style="width:16px;height:16px;">¥</span><span style="font:700 11px inherit;color:var(--ink);">あと <b style="color:var(--accent-ink);font-size:16px;font-weight:900;">300</b> えん</span></div>
        </div>
      </div>
      <!-- 追加 -->
      <div class="cs-span"><div style="border:2.5px dashed #9cc6e3;border-radius:18px;height:54px;display:flex;align-items:center;justify-content:center;gap:8px;color:var(--sub);font:var(--hw) 14px inherit;background:rgba(255,255,255,.7);"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="10.5" width="16" height="3.5" rx="1.5"/><rect x="10.25" y="4" width="3.5" height="16" rx="1.5"/></svg>あたらしい ほしいもの</div></div>
    </div>
  </div>

  <nav class="cs-nav">
    <div class="cs-navitem is-on"><div class="pill"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><polygon points="12,3 21,11 3,11"/><rect x="6" y="11" width="12" height="10" rx="1"/></svg></div>ホーム</div>
    <div class="cs-navitem"><div class="pill"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><polygon points="12,3 20,12 15,12 15,21 9,21 9,12 4,12"/></svg></div>ふやす</div>
    <div class="cs-navitem"><div class="pill"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><polygon points="3,9 9,4 9,7 21,7 21,11 9,11 9,14"/><polygon points="21,15 15,20 15,17 3,17 3,13 15,13 15,10"/></svg></div>ふりかえ</div>
    <div class="cs-navitem"><div class="pill"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><polygon points="9.4,16.6 4.6,11.8 6.5,9.9 9.4,12.8 17.5,4.7 19.4,6.6"/></svg></div>おしごと</div>
    <div class="cs-navitem"><div class="pill"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="7.4" height="16" rx="1.5"/><rect x="12.6" y="4" width="7.4" height="16" rx="1.5"/></svg></div>やくそく</div>
  </nav>
</div>
