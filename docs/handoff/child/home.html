<!-- ========================================================================
  UNOZAWA BANK / 子供・ホーム
  必要: child.css。data-theme を "rei"(水彩) / "jun"(アメコミ) で切替。
  アバターは .cs-avatar img の src を差し替え（未設定時アイコン）。
  ======================================================================== -->
<div class="cs-scr" data-theme="rei" data-screen="home">
  <span class="cs-blob cs-b1"></span><span class="cs-blob cs-b2"></span><span class="cs-blob cs-b3"></span>
  <div class="cs-status"><span>9:41</span><span class="r">▮▮▮ 100%</span></div>

  <div class="cs-head">
    <span class="cs-avatar"><img src="../mascots/rei-avatar.png" alt="" onerror="this.style.display='none'"></span>
    <div><div class="cs-hello">おはよう！</div><div class="cs-name">れい</div></div>
    <div class="cs-bal"><div class="k">もってる おかね</div><div class="v">¥1,670</div></div>
  </div>

  <div class="cs-mascot">
    <div class="cs-bubble"><ruby>今日<rt>きょう</rt></ruby>も おかねを ためよう！</div>
    <div class="cs-mascot-badge">
      <svg width="40" height="40" viewBox="0 0 64 64" fill="none"><rect x="19" y="13" width="26" height="16" rx="2.5" fill="#FFD86F"/><circle cx="26" cy="21" r="4.3" fill="none" stroke="#1B3A6B" stroke-width="1.6"/><path d="M33 18 H41 M33 21 H41 M33 24 H38" stroke="#1B3A6B" stroke-width="1.4" stroke-linecap="round"/><path d="M13 20 a4 4 0 0 1 8 0 v13 q11 4.5 22 0 v-13 a4 4 0 0 1 8 0 v13 a15 15 0 0 1 -38 0 Z" fill="#F5B62E"/></svg>
    </div>
  </div>

  <div class="cs-body">
    <div class="cs-grid cs-grid--boxes">
      <!-- ためる（大） -->
      <div class="cs-card cs-span" style="padding:18px 18px 16px;">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
          <div class="cs-boxic" style="background:#FFEDE9;color:#FF7E6B;">
            <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><rect x="5" y="9" width="14" height="11" rx="3"/><rect x="8" y="5" width="8" height="3" rx="1.5"/></svg>
          </div>
          <div class="cs-h2">ためる</div>
          <div class="cs-amt" style="margin-left:auto;">850<small>えん</small></div>
        </div>
        <div class="cs-inner-panel">
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
            <span class="cs-goalpic"><img src="" alt="" onerror="this.style.display='none'"></span>
            <div style="line-height:1.7;">
              <div style="font:700 10px inherit;color:var(--sub);"><ruby>目標<rt>もくひょう</rt></ruby></div>
              <div style="font:var(--hw) 17px inherit;color:var(--ink);"><ruby>新<rt>あたら</rt></ruby>しいゲーム</div>
              <div style="margin-top:4px;"><span class="cs-badge" style="background:var(--accent);">ほかに 2こ ›</span></div>
            </div>
          </div>
          <div class="cs-bar"><i style="width:57%;"></i></div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px;">
            <div class="cs-coins"><span class="cs-coin">¥</span><span class="cs-coin">¥</span><span class="cs-coin">¥</span><span class="cs-coin">¥</span><span class="cs-coin">¥</span><span class="cs-coin">¥</span></div>
            <div class="cs-remain">あと <b>650</b> <ruby>円<rt>えん</rt></ruby></div>
          </div>
        </div>
      </div>
      <!-- つかう -->
      <div class="cs-card" style="padding:15px;">
        <div class="cs-boxic" style="background:#E4F5FF;color:#2C7BB0;width:40px;height:40px;margin-bottom:10px;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="6" width="18" height="13" rx="3"/><circle cx="16" cy="12.5" r="2.3" fill="#fff"/></svg>
        </div>
        <div style="font:var(--hw) 17px inherit;color:var(--ink);">つかう</div>
        <div style="font:var(--hw) 22px inherit;color:var(--ink);margin:2px 0 8px;">320<small style="font-size:12px;">えん</small></div>
        <div class="cs-coins"><span class="cs-coin" style="width:18px;height:18px;">¥</span><span class="cs-coin" style="width:18px;height:18px;">¥</span><span class="cs-coin" style="width:18px;height:18px;">¥</span></div>
      </div>
      <!-- ふやす -->
      <div class="cs-card" style="padding:15px;">
        <div class="cs-boxic" style="background:#FFF6DA;color:#E0A810;width:40px;height:40px;margin-bottom:10px;">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><polygon points="12,3 20,12 15,12 15,21 9,21 9,12 4,12"/></svg>
        </div>
        <div style="display:flex;align-items:center;gap:6px;">
          <div style="font:var(--hw) 17px inherit;color:var(--ink);">ふやす</div>
          <span class="cs-badge cs-badge--grow"><svg width="9" height="9" viewBox="0 0 24 24" fill="currentColor"><polygon points="12,4 20,14 4,14"/></svg>ふえる</span>
        </div>
        <div style="font:var(--hw) 22px inherit;color:var(--ink);margin:2px 0 8px;">500<small style="font-size:12px;">えん</small></div>
        <div class="cs-coins"><span class="cs-coin" style="width:18px;height:18px;">¥</span><span class="cs-coin" style="width:18px;height:18px;">¥</span><span class="cs-coin" style="width:18px;height:18px;">¥</span><span class="cs-coin" style="width:18px;height:18px;">¥</span><span class="cs-coin" style="width:18px;height:18px;">¥</span></div>
      </div>
    </div>
  </div>

  <nav class="cs-nav">
    <div class="cs-navitem is-on"><div class="pill"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><polygon points="12,3 21,11 3,11"/><rect x="6" y="11" width="12" height="10" rx="1"/></svg></div>ホーム</div>
    <div class="cs-navitem"><div class="pill"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><polygon points="12,3 20,12 15,12 15,21 9,21 9,12 4,12"/></svg></div>ふやす</div>
    <div class="cs-navitem"><div class="pill"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><polygon points="3,9 9,4 9,7 21,7 21,11 9,11 9,14"/><polygon points="21,15 15,20 15,17 3,17 3,13 15,13 15,10"/></svg></div>ふりかえ</div>
    <div class="cs-navitem"><div class="pill"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><polygon points="9.4,16.6 4.6,11.8 6.5,9.9 9.4,12.8 17.5,4.7 19.4,6.6"/></svg></div>おしごと</div>
    <div class="cs-navitem"><div class="pill"><svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="7.4" height="16" rx="1.5"/><rect x="12.6" y="4" width="7.4" height="16" rx="1.5"/></svg></div>やくそく</div>
  </nav>
</div>
