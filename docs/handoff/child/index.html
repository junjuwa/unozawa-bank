<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="design_doc_mode" content="canvas">
<title>UNOZAWA BANK — 子供画面（両テーマ・プレビュー）</title>
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link rel="stylesheet" href="child.css">
<style>
  body{margin:0;font-family:'Zen Maru Gothic',system-ui,sans-serif;background:#e9ecf1;background-image:radial-gradient(circle,rgba(0,0,0,.05) 1px,transparent 1.5px);background-size:22px 22px;}
  .wrap{padding:56px 64px 90px;width:max-content;min-width:100%;}
  .h{font:800 18px 'Zen Maru Gothic';color:#2b3340;margin:0 0 4px;}
  .sub{font:400 12px system-ui;color:#6b7480;margin:0 0 26px;max-width:820px;line-height:1.7;}
  .secttl{font:800 15px 'Zen Maru Gothic';margin:30px 0 16px;display:flex;align-items:center;gap:8px;}
  .secttl .d{width:11px;height:11px;border-radius:50%;}
  .row{display:flex;align-items:flex-start;gap:40px;}
  .cell{display:flex;flex-direction:column;gap:10px;}
  .cap{font:600 12px system-ui;color:#37526e;}
  .cap b{font:500 11px ui-monospace,monospace;color:#8a93a0;}
</style>
</head>
<body>
<div class="wrap">
  <div class="h">UNOZAWA BANK — 子供画面 6種（組み込み用 / 骨格共通・テーマ切替・レスポンシブ）</div>
  <div class="sub">各画面は <code>child.css</code> ＋ <code>*.html</code> の <code>&lt;div class="cs-scr" data-theme="…"&gt;</code> 単体で成立。<code>data-theme</code> を <code>rei</code>（水彩）/ <code>jun</code>（アメコミ）で切替＝骨格そのまま表層だけ差し替わります。下は同じフラグメントを両テーマで表示。</div>
  <div class="secttl"><span class="d" style="background:#FF7E6B;"></span>れい（水彩）</div>
  <div class="row" id="row-rei"></div>
  <div class="secttl"><span class="d" style="background:#E2231A;"></span>じゅん（アメコミ）</div>
  <div class="row" id="row-jun"></div>
</div>

<template id="__bundler_thumbnail">
  <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><rect width="100" height="100" fill="#8FD3F4"/><rect x="22" y="18" width="56" height="64" rx="12" fill="#fff"/><circle cx="50" cy="40" r="13" fill="#FFD23F" stroke="#fff" stroke-width="2"/><rect x="34" y="64" width="32" height="8" rx="4" fill="#FF7E6B"/></svg>
</template>

<script>
const FILES=[
  ['home.html','ホーム'],['goals.html','ためる（目標一覧）'],['invest.html','ふやす'],
  ['transfer.html','ふりかえ（振替）'],['jobs.html','おしごと'],['rules.html','やくそく']
];
(async()=>{
  const cache={};
  for(const [file] of FILES){ try{cache[file]=await (await fetch(file)).text();}catch(e){cache[file]='<div style="color:#c00">'+file+'</div>';} }
  for(const theme of ['rei','jun']){
    const row=document.getElementById('row-'+theme);
    for(const [file,label] of FILES){
      const cell=document.createElement('div'); cell.className='cell';
      const html=cache[file].replace('data-theme="rei"','data-theme="'+theme+'"');
      cell.innerHTML=`<div class="cap">${label} <b>${file}</b></div>${html}`;
      row.appendChild(cell);
    }
  }
})();
</script>
</body>
</html>
